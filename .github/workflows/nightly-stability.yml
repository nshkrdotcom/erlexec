name: nightly-stability

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  stability:
    name: stability (otp 28, g++)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          rebar3-version: "3.27.0"

      - name: Run stability harness
        env:
          CXX: g++
          STABILITY_RUNS: "10"
        run: bash scripts/eunit_harness.sh stability

  sanitizers:
    name: sanitizers (otp 28, clang++)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          rebar3-version: "3.27.0"

      - name: Install Clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Print build environment
        env:
          CXX: clang++
          OPTIMIZE: "0"
          SANITIZE: "address,undefined"
        run: |
          echo "OTP_VERSION=$(erl -noshell -noinput -eval 'io:format(\"~ts\", [erlang:system_info(otp_release)]), halt(0).')"
          echo "REBAR3_VERSION=$(rebar3 version | head -n 1)"
          echo "CXX=$CXX"
          "$CXX" --version | head -n 1
          make -C c_src info

      - name: Run ASan/UBSan eunit
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
          LSAN_OPTIONS: detect_leaks=0
          UBSAN_OPTIONS: print_stacktrace=1
          CXX: clang++
          OPTIMIZE: "0"
          SANITIZE: "address,undefined"
        run: |
          rebar3 clean
          rebar3 eunit
