name: ci

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  canonical-eunit:
    name: canonical eunit (otp ${{ matrix.otp }}, ${{ matrix.compiler }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        otp: ["27", "28"]
        compiler: ["g++", "clang++"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: "3.27.0"

      - name: Install Clang
        if: matrix.compiler == 'clang++'
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Print build environment
        env:
          CXX: ${{ matrix.compiler }}
        run: |
          echo "OTP_VERSION=$(erl -noshell -noinput -eval 'io:format(\"~ts\", [erlang:system_info(otp_release)]), halt(0).')"
          echo "REBAR3_VERSION=$(rebar3 version | head -n 1)"
          echo "CXX=$CXX"
          "$CXX" --version | head -n 1
          OPTIMIZE=3 make -C c_src info

      - name: Run canonical rebar3 eunit
        env:
          CXX: ${{ matrix.compiler }}
        run: |
          rebar3 clean
          rebar3 eunit

  harness-fast:
    name: harness fast (otp 28, g++)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: canonical-eunit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          rebar3-version: "3.27.0"

      - name: Run fast harness
        env:
          CXX: g++
        run: bash scripts/eunit_harness.sh fast

  harness-full:
    name: harness full (otp 28, g++)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: harness-fast
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          rebar3-version: "3.27.0"

      - name: Run full harness
        env:
          CXX: g++
        run: bash scripts/eunit_harness.sh full

  macos-smoke:
    name: macOS smoke (otp 28, c++)
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          rebar3-version: "3.27.0"

      - name: Print build environment
        env:
          CXX: c++
        run: |
          echo "OTP_VERSION=$(erl -noshell -noinput -eval 'io:format(\"~ts\", [erlang:system_info(otp_release)]), halt(0).')"
          echo "REBAR3_VERSION=$(rebar3 version | head -n 1)"
          echo "CXX=$CXX"
          "$CXX" --version | head -n 1
          OPTIMIZE=3 make -C c_src info

      - name: Run macOS smoke tests
        env:
          CXX: c++
        run: |
          rebar3 clean
          rebar3 eunit
